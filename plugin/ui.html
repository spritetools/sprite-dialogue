<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{SPRITE_NAME}} · sprite-dialogue</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  /* Warm-dark palette — derived from the spritetools.github.io brand orange.
     Cool grays from the original Tailwind palette swapped for warm grays so
     the orange accent reads as native rather than imposed. */
  :root {
    --bg: #1a1612;
    --card: #26201b;
    --border: #3a3128;
    --border-2: #574838;
    --text: #f0e9e0;
    --text-2: #d4c8b8;
    --text-muted: #8a7d6e;
    --accent: #e2733e;        /* brand orange */
    --accent-hi: #f29368;     /* lighter — links, hover-brighten */
    --accent-down: #c95f2a;   /* darker — primary button press */
    --user-bubble: #a85725;   /* dark warm orange — user message bg */
    --drop-overlay-bg: rgba(226, 115, 62, 0.18);
    --ok: #22c55e;
    --err: #ef4444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* -- Header -- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.625rem 1rem;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 0.875rem; font-weight: 600; color: var(--accent); }
  /* Status pill: colored dot + label. JS just toggles .connected on the
     parent; text + dot color come from CSS so there's no DOM coupling. */
  #status {
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    user-select: none;
  }
  #status::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--err);
    margin-right: 0.4rem;
    transition: background 0.3s;
  }
  #status::after { content: 'reconnecting…'; }
  #status.connected::before { background: var(--ok); }
  #status.connected::after { content: 'connected'; }

  /* -- Messages -- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  /* Empty state — shown only when #messages has no children. Vanishes as soon
     as the first bubble is appended (backfill or live), so no JS is needed. */
  #messages:empty::before {
    content: 'Send a message, paste a screenshot, or drop an image to begin.\A\ACmd+V paste · drag-drop · Attach button';
    white-space: pre-line;
    display: block;
    align-self: center;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.875rem;
    padding: 4rem 2rem;
    max-width: 28rem;
    line-height: 1.6;
  }

  .msg {
    max-width: 80%;
    padding: 0.625rem 0.875rem;
    border-radius: 12px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  /* Asymmetric corner near the speaker's "side" — assistant bubbles square the
     bottom-left, user bubbles square the bottom-right. Reads instantly as
     sender direction even before the bubble color/alignment register. */
  .msg-assistant {
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }

  /* Activity bubble — singleton ephemeral bubble shown while claude is mid-burst.
     Visually distinct from real bubbles: dashed orange border, orange wash,
     pronounced pulse on opacity + bg + border so it reads as "alive" without
     having to look closely. Updated in place by updateActivity(); removed
     entirely on idle (its content was a status, not a record). */
  .msg-activity {
    align-self: flex-start;
    border-style: dashed;
    border-width: 1px;
    border-bottom-left-radius: 4px;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.8125rem;
    animation: activity-pulse 1.5s ease-in-out infinite;
  }
  @keyframes activity-pulse {
    0%, 100% {
      opacity: 0.7;
      background: rgba(226, 115, 62, 0.04);
      border-color: rgba(226, 115, 62, 0.45);
    }
    50% {
      opacity: 1;
      background: rgba(226, 115, 62, 0.22);
      border-color: rgba(226, 115, 62, 1);
    }
  }
  .activity-text { display: flex; align-items: center; gap: 0.4rem; min-width: 0; flex: 1; }
  .activity-count { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .activity-tool {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.92em;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .activity-elapsed {
    color: var(--text-muted);
    font-size: 0.72rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .activity-bell {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.15rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .activity-bell svg { width: 14px; height: 14px; display: block; }
  .activity-bell:hover { color: var(--text); background: rgba(0,0,0,0.25); }
  .activity-bell.armed { color: var(--accent); }
  .activity-bell.armed:hover { color: var(--accent-hi); }

  .msg-meta {
    font-size: 0.6875rem;
    opacity: 0.5;
    margin-top: 0.25rem;
  }

  .msg-text { white-space: pre-wrap; }

  /* Rendered markdown — keep tight inside chat bubbles */
  .msg-md { line-height: 1.55; }
  .msg-md p { margin: 0 0 0.5rem 0; }
  .msg-md p:last-child { margin-bottom: 0; }
  .msg-md h1, .msg-md h2, .msg-md h3, .msg-md h4 {
    margin: 0.75rem 0 0.375rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .msg-md h1 { font-size: 1.15rem; }
  .msg-md h2 { font-size: 1.05rem; }
  .msg-md h3, .msg-md h4 { font-size: 0.95rem; }
  .msg-md ul, .msg-md ol { margin: 0.25rem 0 0.5rem 1.25rem; }
  .msg-md li { margin: 0.125rem 0; }
  .msg-md li > p { margin: 0; }
  .msg-md code {
    background: rgba(0,0,0,0.35);
    padding: 0.05rem 0.35rem;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.875em;
  }
  .msg-md pre {
    background: rgba(0,0,0,0.4);
    padding: 0.625rem 0.75rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: 0.5rem 0;
    font-size: 0.85em;
    line-height: 1.45;
  }
  .msg-md pre code {
    background: transparent;
    padding: 0;
    border-radius: 0;
    font-size: 1em;
  }
  /* Copy-to-clipboard button on each rendered code block. The wrapper hosts
     the absolute positioning so the button doesn't scroll with the pre's
     overflow-x. Injected by addCopyButtons() after marked renders. */
  .code-block {
    position: relative;
    margin: 0.5rem 0;
  }
  .code-block pre { margin: 0; }
  .copy-btn {
    position: absolute;
    top: 0.3rem;
    right: 0.3rem;
    background: rgba(0,0,0,0.4);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
  .copy-btn svg { width: 14px; height: 14px; display: block; }
  .copy-btn:hover { color: var(--text); background: rgba(0,0,0,0.6); }
  .copy-btn.copied { color: var(--ok); border-color: var(--ok); }
  .copy-btn.failed { color: var(--err); border-color: var(--err); }
  .msg-md a { color: var(--accent-hi); text-decoration: underline; }
  .msg-md blockquote {
    border-left: 3px solid var(--border-2);
    margin: 0.375rem 0;
    padding: 0 0.75rem;
    opacity: 0.85;
  }
  .msg-md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.625rem 0;
  }
  .msg-md table {
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.875em;
  }
  .msg-md th, .msg-md td {
    border: 1px solid var(--border);
    padding: 0.25rem 0.5rem;
  }
  .msg-md strong { font-weight: 600; }

  .msg-reply-quote {
    font-size: 0.75rem;
    opacity: 0.6;
    border-left: 2px solid var(--text-muted);
    padding-left: 0.5rem;
    margin-bottom: 0.375rem;
    max-height: 2.5em;
    overflow: hidden;
  }

  .msg-image {
    max-width: 100%;
    max-height: 400px;
    border-radius: 8px;
    margin-top: 0.375rem;
    cursor: pointer;
    display: block;
  }

  .msg-file-link {
    display: inline-block;
    margin-top: 0.375rem;
    color: var(--accent-hi);
    text-decoration: underline;
  }

  /* -- Drop overlay -- */
  #drop-overlay {
    position: fixed;
    inset: 0;
    background: var(--drop-overlay-bg);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent-hi);
    border: 3px dashed var(--accent);
    z-index: 100;
    pointer-events: none;
  }
  #drop-overlay.active { display: flex; }

  /* -- Compose -- */
  #compose {
    flex-shrink: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }

  #preview-bar {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0.375rem;
    background: var(--border);
    border-radius: 8px;
  }
  #preview-bar.active { display: flex; }
  #preview-thumb {
    height: 48px;
    max-width: 120px;
    border-radius: 4px;
    object-fit: cover;
  }
  #preview-name { font-size: 0.75rem; opacity: 0.7; flex: 1; }
  #preview-remove {
    background: none; border: none; color: var(--err);
    font-size: 1rem; cursor: pointer; padding: 0.25rem;
  }

  #compose-row {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
  }

  /* Text input wrapper hosts the textarea + an absolutely-positioned clear
     button. The wrapper takes the flex slot so the row layout stays the same. */
  .text-wrap {
    flex: 1;
    position: relative;
    display: flex;
  }
  #text {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font: inherit;
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
    min-height: 2.5rem;
    max-height: 8rem;
    outline: none;
  }
  #text:focus { border-color: var(--accent); }
  /* Clear button: hidden until the textarea has content. Pushes the textarea's
     right padding so typed text doesn't slide under the ×. */
  #clear-text {
    position: absolute;
    right: 0.4rem;
    top: 0.4rem;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.15rem 0.4rem;
    cursor: pointer;
    display: none;
    border-radius: 4px;
  }
  #clear-text:hover { color: var(--text); background: var(--border); }
  .text-wrap.has-content #clear-text { display: block; }
  .text-wrap.has-content #text { padding-right: 2rem; }

  #compose-actions {
    display: flex;
    gap: 0.375rem;
    align-items: center;
  }

  .btn {
    background: none;
    border: 1px solid var(--border-2);
    color: var(--text-2);
    border-radius: 6px;
    padding: 0.375rem 0.625rem;
    font-size: 0.8125rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-down); border-color: var(--accent-down); }

  #file-input { display: none; }

  /* -- Lightbox -- */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
  }
  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    border-radius: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>{{SPRITE_NAME}}</h1>
  <div id="status"></div>
</header>

<div id="messages"></div>

<div id="drop-overlay">Drop image here</div>

<div id="lightbox" onclick="this.style.display='none'">
  <img src="" alt="preview">
</div>

<form id="compose" onsubmit="return handleSubmit(event)">
  <div id="preview-bar">
    <img id="preview-thumb" src="" alt="preview">
    <span id="preview-name"></span>
    <button type="button" id="preview-remove" onclick="clearPending()">&times;</button>
  </div>
  <div id="compose-row">
    <div class="text-wrap">
      <textarea id="text" rows="1" placeholder="Message or paste a screenshot..." autocomplete="off"></textarea>
      <button type="button" id="clear-text" onclick="clearText()" title="Clear (Esc)" tabindex="-1">&times;</button>
    </div>
    <div id="compose-actions">
      <button type="button" class="btn" onclick="document.getElementById('file-input').click()">Attach</button>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(this)">
      <button type="submit" class="btn btn-primary">Send</button>
    </div>
  </div>
</form>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const messagesEl = document.getElementById('messages')
const textEl = document.getElementById('text')
const statusEl = document.getElementById('status')
const previewBar = document.getElementById('preview-bar')
const previewThumb = document.getElementById('preview-thumb')
const previewName = document.getElementById('preview-name')
const dropOverlay = document.getElementById('drop-overlay')
const lightbox = document.getElementById('lightbox')
const lightboxImg = lightbox.querySelector('img')

const msgMap = {}   // id -> { el, bodyEl, text }
let pendingFile = null  // File or Blob
let pendingObjectUrl = null
let uid = 0

// ---------------------------------------------------------------------------
// WebSocket with auto-reconnect, outbound queue, and liveness probing
// ---------------------------------------------------------------------------
// App-layer heartbeat: send {type:'ping'} every PING_INTERVAL_MS, expect a
// {type:'pong'} within PONG_TIMEOUT_MS. Catches half-open sockets that the
// transport layer doesn't notice (laptop sleep, NAT eviction, etc.). The
// 25s/5s pair gives a worst-case detection latency of ~30s while staying
// well under common idle-timeout policies (NATs, proxies, load balancers
// at 60s+) and well above typical RTT/jitter.
const PING_INTERVAL_MS = 25_000
const PONG_TIMEOUT_MS = 5_000

let ws = null
let reconnectDelay = 500
let reconnectTimer = null
let pingTimer = null
let pongTimer = null
let inSnapshot = false      // true between snapshot-start / snapshot-end backfill markers
const outboundQueue = []  // messages to send once WS is open

function wsSend(payload) {
  const data = JSON.stringify(payload)
  if (ws && ws.readyState === 1) {
    try { ws.send(data); return true }
    catch (err) { console.warn('ws.send failed, queuing:', err) }
  }
  outboundQueue.push(data)
  return false
}

function flushQueue() {
  while (outboundQueue.length && ws && ws.readyState === 1) {
    try { ws.send(outboundQueue.shift()) }
    catch (err) { console.warn('flush failed:', err); break }
  }
}

function startPings() {
  stopPings()
  pingTimer = setInterval(() => {
    if (!ws || ws.readyState !== 1) return
    try { ws.send(JSON.stringify({ type: 'ping' })) }
    catch (err) { console.warn('ping send failed:', err); return }
    if (pongTimer) clearTimeout(pongTimer)
    pongTimer = setTimeout(() => {
      // No pong within the budget — connection is dead. Force-close so onclose
      // fires and the existing reconnect path runs.
      console.warn('no pong within ' + PONG_TIMEOUT_MS + 'ms, forcing reconnect')
      try { ws.close(4000, 'no-pong') } catch {}
    }, PONG_TIMEOUT_MS)
  }, PING_INTERVAL_MS)
}

function stopPings() {
  if (pingTimer) { clearInterval(pingTimer); pingTimer = null }
  if (pongTimer) { clearTimeout(pongTimer); pongTimer = null }
}

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(proto + '//' + location.host + '/ws')

  ws.onopen = () => {
    statusEl.classList.add('connected')
    reconnectDelay = 500
    flushQueue()
    startPings()
  }

  ws.onclose = () => {
    statusEl.classList.remove('connected')
    stopPings()
    reconnectTimer = setTimeout(connect, reconnectDelay)
    reconnectDelay = Math.min(reconnectDelay * 2, 8000)
  }

  ws.onmessage = (e) => {
    const m = JSON.parse(e.data)
    if (m.type === 'pong') {
      if (pongTimer) { clearTimeout(pongTimer); pongTimer = null }
      return
    }
    if (m.type === 'snapshot-start') { inSnapshot = true; return }
    if (m.type === 'snapshot-end') { inSnapshot = false; scrollToBottom(); return }
    if (m.type === 'msg') addMessage(m)
    if (m.type === 'edit') editMessage(m.id, m.text)
    if (m.type === 'activity') updateActivity(m)
  }
}

// On tab becoming visible, if we're not connected, reconnect immediately
// (skip the backoff). This is the fast path for laptop-wake / tab-refocus —
// otherwise we'd wait up to PING_INTERVAL_MS + PONG_TIMEOUT_MS for the
// liveness probe to notice the dead socket.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return
  if (ws && ws.readyState === 1) return
  if (ws && (ws.readyState === 0 || ws.readyState === 2)) return
  reconnectDelay = 500
  connect()
})

connect()

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function addMessage(m) {
  if (m.id && msgMap[m.id]) return  // dedupe — already shown (e.g. backfill+live overlap)
  const div = document.createElement('div')
  div.className = 'msg msg-' + m.from

  // Quote reply
  if (m.replyTo && msgMap[m.replyTo]) {
    const quote = document.createElement('div')
    quote.className = 'msg-reply-quote'
    quote.textContent = msgMap[m.replyTo].text.slice(0, 120)
    div.appendChild(quote)
  }

  // Text body — markdown for assistant, plain for user
  const body = document.createElement('div')
  if (m.from === 'assistant' && m.text && window.marked && window.DOMPurify) {
    body.className = 'msg-md'
    const rendered = marked.parse(m.text, { breaks: true, gfm: true })
    body.innerHTML = DOMPurify.sanitize(rendered)
    body.querySelectorAll('a[href^="/project/root/"]').forEach(a => {
      a.setAttribute('target', '_blank')
      a.setAttribute('rel', 'noopener')
    })
    addCopyButtons(body)
  } else {
    body.className = 'msg-text'
    body.textContent = m.text || ''
  }
  div.appendChild(body)

  // File / image
  if (m.file) {
    if (m.file.isImage) {
      const img = document.createElement('img')
      img.className = 'msg-image'
      img.src = m.file.url
      img.alt = m.file.name
      img.loading = 'lazy'
      img.onclick = () => openLightbox(img.src)
      img.onload = () => { if (wasNearBottom) scrollToBottom() }
      div.appendChild(img)
    } else {
      const a = document.createElement('a')
      a.className = 'msg-file-link'
      a.href = m.file.url
      a.download = m.file.name
      a.textContent = m.file.name
      div.appendChild(a)
    }
  }

  // Timestamp
  const meta = document.createElement('div')
  meta.className = 'msg-meta'
  meta.textContent = new Date(m.ts).toLocaleTimeString()
  div.appendChild(meta)

  // Capture scroll position BEFORE appending so we can detect "was at bottom"
  const wasNearBottom = isNearBottom() || m.from === 'user'

  messagesEl.appendChild(div)
  msgMap[m.id] = { el: div, bodyEl: body, text: m.text || '' }

  // During a backfill snapshot, suppress per-message auto-scroll — the
  // snapshot-end handler does a single scroll-to-bottom after the bulk-append.
  if (wasNearBottom && !inSnapshot) scrollToBottom()
}

// Wrap each rendered code block in a positioning container and inject a small
// copy-to-clipboard button. Idempotent — safe to call repeatedly on the same
// container (already-wrapped pres are skipped).
const COPY_ICON = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M2.5 10.5 V3.5 a1 1 0 0 1 1 -1 H10.5"/></svg>`
const CHECK_ICON = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3,8 7,12 13,4"/></svg>`
const BELL_OUTLINE = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2 V3"/><path d="M3.5 12 V8 a4.5 4.5 0 0 1 9 0 V12 H3.5 Z"/><path d="M2.5 12 H13.5"/><path d="M6.5 13.5 a1.5 1.5 0 0 0 3 0"/></svg>`
const BELL_FILLED = `<svg viewBox="0 0 16 16" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2 V3" fill="none"/><path d="M3.5 12 V8 a4.5 4.5 0 0 1 9 0 V12 H3.5 Z"/><path d="M2.5 12 H13.5" fill="none"/><path d="M6.5 13.5 a1.5 1.5 0 0 0 3 0" fill="none"/></svg>`

function addCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement && pre.parentElement.classList.contains('code-block')) return
    const wrap = document.createElement('div')
    wrap.className = 'code-block'
    pre.parentNode.insertBefore(wrap, pre)
    wrap.appendChild(pre)
    const btn = document.createElement('button')
    btn.type = 'button'
    btn.className = 'copy-btn'
    btn.title = 'Copy to clipboard'
    btn.innerHTML = COPY_ICON
    btn.onclick = () => copyCode(btn, pre)
    wrap.appendChild(btn)
  })
}

function copyCode(btn, pre) {
  const text = pre.textContent || ''
  const flash = (icon, klass) => {
    btn.innerHTML = icon
    btn.classList.add(klass)
    setTimeout(() => {
      btn.innerHTML = COPY_ICON
      btn.classList.remove(klass)
    }, 1200)
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => flash(CHECK_ICON, 'copied'))
      .catch(() => flash(COPY_ICON, 'failed'))
  } else {
    flash(COPY_ICON, 'failed')
  }
}

// ---------------------------------------------------------------------------
// Activity bubble — singleton "claude is working" indicator. Driven by
// {type:'activity', state:'busy'|'idle', toolCallCount, latestTool} messages
// from the server. Bubble is created lazily and removed on idle.
// ---------------------------------------------------------------------------
let activityBubble = null
let activityArmed = false
let activityState = 'idle'
let activityStartedAt = null
let activityElapsedTimer = null

function updateActivity(m) {
  const wasBusy = activityState === 'busy'
  activityState = m.state
  if (m.state === 'busy') {
    activityStartedAt = m.startedAt || activityStartedAt || Date.now()
    showActivity(m.toolCallCount || 0, m.latestTool || null)
  } else {
    hideActivity()
    activityStartedAt = null
    if (wasBusy && activityArmed) {
      activityArmed = false
      playChime()
    }
  }
}

function showActivity(count, latestTool) {
  if (!activityBubble) {
    activityBubble = document.createElement('div')
    activityBubble.className = 'msg msg-activity'
    const text = document.createElement('div')
    text.className = 'activity-text'
    const countEl = document.createElement('span')
    countEl.className = 'activity-count'
    text.appendChild(countEl)
    const toolEl = document.createElement('span')
    toolEl.className = 'activity-tool'
    text.appendChild(toolEl)
    activityBubble.appendChild(text)
    const elapsedEl = document.createElement('span')
    elapsedEl.className = 'activity-elapsed'
    activityBubble.appendChild(elapsedEl)
    const bell = document.createElement('button')
    bell.type = 'button'
    bell.className = 'activity-bell'
    bell.title = 'Notify when done'
    bell.innerHTML = BELL_OUTLINE
    bell.onclick = toggleArmed
    activityBubble.appendChild(bell)
    const wasNearBottom = isNearBottom()
    messagesEl.appendChild(activityBubble)
    if (wasNearBottom && !inSnapshot) scrollToBottom()
    // Update the elapsed display once a second. Reads activityStartedAt
    // (module-scoped) so the value stays accurate if the server resends it.
    updateElapsedDisplay()
    activityElapsedTimer = setInterval(updateElapsedDisplay, 1000)
  }

  const countEl = activityBubble.querySelector('.activity-count')
  const toolEl = activityBubble.querySelector('.activity-tool')
  if (count === 0) {
    // Pre-tool-call window: claude is "thinking" — generating text or deciding
    // what to do next. Same period claude code itself shows "Precipitating…" for.
    countEl.textContent = 'thinking…'
    toolEl.textContent = ''
  } else {
    countEl.textContent = count + ' tool ' + (count === 1 ? 'call' : 'calls')
    toolEl.textContent = latestTool ? '· ' + latestTool.name + ': ' + truncate(latestTool.summary, 40) : ''
  }
  updateElapsedDisplay()
}

function updateElapsedDisplay() {
  if (!activityBubble || activityStartedAt == null) return
  const seconds = Math.max(0, Math.floor((Date.now() - activityStartedAt) / 1000))
  activityBubble.querySelector('.activity-elapsed').textContent = formatDuration(seconds)
}

function formatDuration(s) {
  if (s < 60) return s + 's'
  if (s < 3600) {
    const m = Math.floor(s / 60)
    const sec = s % 60
    return m + 'm' + (sec < 10 ? '0' : '') + sec + 's'
  }
  const h = Math.floor(s / 3600)
  const m = Math.floor((s % 3600) / 60)
  return h + 'h' + (m < 10 ? '0' : '') + m + 'm'
}

function hideActivity() {
  if (activityElapsedTimer) {
    clearInterval(activityElapsedTimer)
    activityElapsedTimer = null
  }
  if (activityBubble) {
    activityBubble.remove()
    activityBubble = null
  }
}

function toggleArmed() {
  activityArmed = !activityArmed
  if (activityBubble) {
    const bell = activityBubble.querySelector('.activity-bell')
    bell.innerHTML = activityArmed ? BELL_FILLED : BELL_OUTLINE
    bell.classList.toggle('armed', activityArmed)
  }
}

function truncate(s, n) {
  if (!s) return ''
  return s.length > n ? s.slice(0, n - 1) + '…' : s
}

// Brief synthesized "ding" via Web Audio. The user's click on the bell counts
// as the activation gesture, so the autoplay policy doesn't block us.
//
// Volume is tunable via CHIME_VOLUME (0–1, peak gain). Pure sine waves sound
// quieter than they really are because they have no harmonic content; we
// stack the fundamental with an octave above (at lower amplitude, faster
// decay) so the chime cuts through without feeling shrill.
const CHIME_VOLUME = 1.0
function playChime() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext
    if (!Ctx) return
    const ctx = new Ctx()
    const t = ctx.currentTime
    const tone = (freq, peak, duration) => {
      const osc = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.frequency.value = freq
      gain.gain.setValueAtTime(0.001, t)
      gain.gain.exponentialRampToValueAtTime(peak, t + 0.02)
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration)
      osc.start(t)
      osc.stop(t + duration + 0.05)
    }
    tone(880, CHIME_VOLUME, 0.55)            // fundamental (A5)
    tone(1760, CHIME_VOLUME * 0.4, 0.35)     // octave above, fades first
  } catch (err) { console.warn('chime failed:', err) }
}

function editMessage(id, text) {
  const entry = msgMap[id]
  if (!entry) return
  entry.bodyEl.textContent = text + ' (edited)'
  entry.text = text
}

function isNearBottom() {
  const el = messagesEl
  return el.scrollHeight - el.scrollTop - el.clientHeight < 120
}

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' })
}

// ---------------------------------------------------------------------------
// Lightbox
// ---------------------------------------------------------------------------
function openLightbox(src) {
  lightboxImg.src = src
  lightbox.style.display = 'flex'
}

// ---------------------------------------------------------------------------
// Pending image (paste / drop / file picker)
// ---------------------------------------------------------------------------
function setPending(file) {
  pendingFile = file
  if (pendingObjectUrl) URL.revokeObjectURL(pendingObjectUrl)
  pendingObjectUrl = URL.createObjectURL(file)
  previewThumb.src = pendingObjectUrl
  previewName.textContent = file.name || 'clipboard.png'
  previewBar.classList.add('active')
}

function clearPending() {
  pendingFile = null
  if (pendingObjectUrl) { URL.revokeObjectURL(pendingObjectUrl); pendingObjectUrl = null }
  previewBar.classList.remove('active')
  document.getElementById('file-input').value = ''
}

// ---------------------------------------------------------------------------
// Clipboard paste
// ---------------------------------------------------------------------------
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items
  if (!items) return
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault()
      const blob = item.getAsFile()
      if (blob) setPending(blob)
      return
    }
  }
})

// ---------------------------------------------------------------------------
// Drag and drop
// ---------------------------------------------------------------------------
let dragCounter = 0

document.addEventListener('dragenter', (e) => {
  e.preventDefault()
  dragCounter++
  dropOverlay.classList.add('active')
})

document.addEventListener('dragleave', (e) => {
  e.preventDefault()
  dragCounter--
  if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active') }
})

document.addEventListener('dragover', (e) => e.preventDefault())

document.addEventListener('drop', (e) => {
  e.preventDefault()
  dragCounter = 0
  dropOverlay.classList.remove('active')
  const file = e.dataTransfer?.files[0]
  if (file && file.type.startsWith('image/')) setPending(file)
})

// ---------------------------------------------------------------------------
// File picker
// ---------------------------------------------------------------------------
function handleFileSelect(input) {
  const file = input.files[0]
  if (file) setPending(file)
}

// ---------------------------------------------------------------------------
// Submit
// ---------------------------------------------------------------------------
function handleSubmit(e) {
  e.preventDefault()
  const text = textEl.value.trim()
  const file = pendingFile

  if (!text && !file) return

  const id = 'u' + Date.now() + '-' + (++uid)

  if (file) {
    // Optimistic render with object URL
    const localUrl = pendingObjectUrl
    const name = file.name || 'clipboard.png'
    const isImage = file.type.startsWith('image/')
    addMessage({ id, from: 'user', text, ts: Date.now(), file: { url: localUrl, name, isImage } })

    // Upload
    const fd = new FormData()
    fd.set('id', id)
    fd.set('text', text)
    fd.set('file', file, name)
    fetch('/upload', { method: 'POST', body: fd })
      .then(r => {
        if (r.ok && r.status !== 204) {
          return r.json().then(data => {
            // Update image src to server URL
            const img = msgMap[id]?.el.querySelector('.msg-image')
            if (img && data.url) img.src = data.url
          })
        }
      })
      .catch(() => {})

    // Clear pending but don't revoke the object URL yet (it's displayed)
    pendingFile = null
    pendingObjectUrl = null
    previewBar.classList.remove('active')
    document.getElementById('file-input').value = ''
  } else {
    // Text-only
    addMessage({ id, from: 'user', text, ts: Date.now() })
    wsSend({ id, text })
  }

  textEl.value = ''
  textEl.style.height = ''
  textEl.parentElement.classList.remove('has-content')
}

// ---------------------------------------------------------------------------
// Auto-resize textarea
// ---------------------------------------------------------------------------
textEl.addEventListener('input', () => {
  textEl.style.height = ''
  textEl.style.height = Math.min(textEl.scrollHeight, 128) + 'px'
  textEl.parentElement.classList.toggle('has-content', textEl.value.length > 0)
})

// Enter to send, Shift+Enter for newline, Esc to clear
textEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    document.getElementById('compose').requestSubmit()
  } else if (e.key === 'Escape' && textEl.value.length > 0) {
    e.preventDefault()
    clearText()
  }
})

function clearText() {
  textEl.value = ''
  textEl.style.height = ''
  textEl.parentElement.classList.remove('has-content')
  textEl.focus()
}
</script>
</body>
